---
- name: Set up vpn networks
  hosts: deployment_nodes
  gather_facts: yes
  any_errors_fatal: true
  tasks:
    - name: Check if vpn container exists
      shell: docker ps -a | grep -q provider_gateway_keepalived
      failed_when: false
      changed_when: false
      register: docker_ps_provider_gateway_keepalived

    - name: Generate random password string on first node
      set_fact:
        keepalived_key: "{{ lookup('password', '/dev/null chars=ascii_letters,digit length=24') }}"
      when: docker_ps_provider_gateway_keepalived.rc != 0
      no_log: true
      when: inventory_hostname == groups['deployment_nodes'][0]

    - name: initialize keepalived peers list
      set_fact:
        keepalived_peers: []

    - name: Build list of keepalived peers
      set_fact:
        keepalived_peers: "{{ keepalived_peers + [ (hostvars[item].ansible_default_ipv4.address | string) ] }}"
      loop: "{{ groups['deployment_nodes'] }}"
      loop_control:
        index_var: index
      when:
        - item != inventory_hostname
        - docker_ps_provider_gateway_keepalived.rc != 0

    - name: deploy keepalived container
      command: |
        docker run -d \
          --cap-add=NET_ADMIN --cap-add=NET_BROADCAST --cap-add=NET_RAW --net=host \
          -e KEEPALIVED_INTERFACE={{ network_provider_gateway_keepalived_interface }} \
          -e KEEPALIVED_PASSWORD={{ hostvars[groups['deployment_nodes'][0]].keepalived_key }} \
          -e KEEPALIVED_UNICAST_PEERS="#PYTHON2BASH:[{% for peer in keepalived_peers %}'{{ peer }}'{% if not loop.last %},{% endif %}{% endfor %}]" \
          -e KEEPALIVED_VIRTUAL_IPS="#PYTHON2BASH:['{{ network_provider_gateway_keepalived_vip }}']" \
          --name provider_gateway_keepalived \
          --restart always \
          osixia/keepalived:2.0.20
      when: docker_ps_provider_gateway_keepalived.rc != 0

    - name: Wait for keepalived to come up
      pause:
        seconds: 5
      when: docker_ps_provider_gateway_keepalived.rc != 0

    - name: Test provider vip connectivity
      command: ping -c 3 {{ network_provider_gateway_keepalived_vip | ansible.netcommon.ipaddr('address') }}
      changed_when: false

    - name: Ensure vip exists only on one node
      shell: ip a | grep {{ network_provider_gateway_keepalived_vip | ansible.netcommon.ipaddr('address') }}/32
      changed_when: false
      failed_when: false
      register: vip_check

    - name: Initialize vip count
      set_fact:
        vip_count: 0
      run_once: true

    - name: Calculate vip count
      set_fact:
        vip_count: "{{ (vip_count | int) + ( hostvars[item].vip_check.stdout_lines | length  ) }}"
      when: hostvars[item].vip_check.stdout_lines is defined
      loop: "{{ groups['deployment_nodes'] }}"
      run_once: true

    - name: Fail if vip doesn't exists exactly once
      fail:
        msg: "The provider gateway VIP {{ network_provider_gateway_keepalived_vip | ansible.netcommon.ipaddr('address') }} exists {{ vip_count }} times! It should exist only once."
      when: 
        - (vip_count | int) != 1
      run_once: true
